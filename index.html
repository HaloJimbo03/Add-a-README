<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wheel Spinner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
  .app { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 16px; }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; padding: 4px 0; }
  .main { display: flex; gap: 16px; flex-wrap: wrap; }
  .wheel-side { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 0 0 300px; }
  .pointer { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 24px solid #1a1a1a; margin-bottom: -5px; }
  canvas { border-radius: 50%; border: 1px solid #ddd; background: #fff; }
  #spin { width: 100%; padding: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #1a1a1a; transition: background 0.15s; }
  #spin:hover { background: #f0f0f0; }
  #spin:disabled { opacity: 0.4; cursor: not-allowed; }
  .result { min-height: 36px; text-align: center; font-size: 20px; font-weight: 700; color: #1a1a1a; }
  .panel { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
  .panel-label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
  .entry-list { display: flex; flex-direction: column; gap: 4px; max-height: 230px; overflow-y: auto; }
  .entry-row { display: flex; align-items: center; gap: 6px; }
  .entry-color { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .entry-row span { flex: 1; font-size: 13px; color: #1a1a1a; background: #fff; border-radius: 6px; padding: 5px 9px; border: 1px solid #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-row button { width: 26px; height: 26px; border: 1px solid #e0e0e0; background: #fff; color: #999; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .entry-row button:hover { background: #fee2e2; color: #c00; border-color: #fca5a5; }
  .add-row { display: flex; gap: 6px; }
  .add-row input { flex: 1; font-size: 14px; padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; background: #fff; color: #1a1a1a; outline: none; }
  .add-row input:focus { border-color: #999; box-shadow: 0 0 0 2px rgba(0,0,0,0.08); }
  .add-row button { padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #1a1a1a; color: #fff; white-space: nowrap; }
  .add-row button:hover { background: #333; }
  .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .actions button { font-size: 12px; padding: 5px 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #555; }
  .actions button:hover { background: #f5f5f5; color: #1a1a1a; }
  .url-section { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .url-section .label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
  .url-row { display: flex; gap: 6px; }
  .url-row input { flex: 1; font-size: 11px; padding: 6px 9px; border: 1px solid #ddd; border-radius: 6px; background: #f9f9f9; color: #555; font-family: monospace; outline: none; }
  .url-row button { padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #fff; color: #1a1a1a; white-space: nowrap; }
  .url-row button:hover { background: #f0f0f0; }
  .hint { font-size: 11px; color: #888; line-height: 1.4; }
  .status { font-size: 12px; color: #555; min-height: 16px; }
</style>
</head>
<body>
<div class="app">
  <h1>Wheel Spinner</h1>
  <div class="main">
    <div class="wheel-side">
      <div class="pointer"></div>
      <canvas id="wheel" width="290" height="290"></canvas>
      <button id="spin" onclick="startSpin()">Spin</button>
      <div class="result" id="result"></div>
    </div>
    <div class="panel">
      <div class="panel-label">Entries</div>
      <div class="entry-list" id="entry-list"></div>
      <div class="add-row">
        <input id="new-entry" type="text" placeholder="Add entry..." maxlength="60" />
        <button onclick="addEntry()">Add</button>
      </div>
      <div class="actions">
        <button onclick="clearAll()">Clear all</button>
      </div>
      <div class="url-section">
        <div class="label">Save to URL</div>
        <div class="url-row">
          <input id="url-out" type="text" readonly placeholder="Click Generate to build your URL..." />
          <button onclick="generateURL()">Generate</button>
          <button onclick="copyURL()">Copy</button>
        </div>
        <div class="hint">Generate a URL with your entries baked in, then paste it into your HaloPSA iframe widget.</div>
        <div class="status" id="status"></div>
      </div>
    </div>
  </div>
</div>
<script>
const COLORS = ['#534AB7','#0F6E56','#993C1D','#185FA5','#854F0B','#993556','#3B6D11','#A32D2D','#3C3489','#085041','#B87333','#4A7C59'];
let entries = [];
let angle = 0;
let spinning = false;

function loadFromURL() {
  try {
    const params = new URLSearchParams(window.location.search);
    const data = params.get('e');
    if (data) {
      const parsed = JSON.parse(decodeURIComponent(data));
      if (Array.isArray(parsed) && parsed.length) { entries = parsed; return; }
    }
  } catch(e) {}
  entries = ['Option 1', 'Option 2', 'Option 3'];
}

function generateURL() {
  const base = window.location.href.split('?')[0];
  const url = base + '?e=' + encodeURIComponent(JSON.stringify(entries));
  document.getElementById('url-out').value = url;
  setStatus('URL ready. Copy it and paste into your HaloPSA iframe widget.');
}

function copyURL() {
  const inp = document.getElementById('url-out');
  if (!inp.value) generateURL();
  navigator.clipboard.writeText(inp.value).then(() => {
    setStatus('Copied to clipboard.');
  }).catch(() => {
    inp.select();
    setStatus('Select the URL above and copy manually (Ctrl+C).');
  });
}

function setStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  setTimeout(() => { s.textContent = ''; }, 3500);
}

function renderList() {
  const list = document.getElementById('entry-list');
  list.innerHTML = '';
  entries.forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'entry-row';
    const dot = document.createElement('div');
    dot.className = 'entry-color';
    dot.style.background = COLORS[i % COLORS.length];
    const label = document.createElement('span');
    label.title = e;
    label.textContent = e;
    const btn = document.createElement('button');
    btn.textContent = 'x';
    btn.onclick = () => removeEntry(i);
    row.appendChild(dot);
    row.appendChild(label);
    row.appendChild(btn);
    list.appendChild(row);
  });
  document.getElementById('url-out').value = '';
}

function addEntry() {
  const inp = document.getElementById('new-entry');
  const val = inp.value.trim();
  if (!val) return;
  entries.push(val);
  inp.value = '';
  renderList();
  drawWheel();
}

function removeEntry(i) {
  entries.splice(i, 1);
  renderList();
  drawWheel();
}

function clearAll() {
  if (!confirm('Clear all entries?')) return;
  entries = [];
  renderList();
  drawWheel();
  document.getElementById('result').textContent = '';
}

document.getElementById('new-entry').addEventListener('keydown', e => {
  if (e.key === 'Enter') addEntry();
});

function drawWheel(highlightIndex) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = 145, cy = 145, r = 142;
  ctx.clearRect(0, 0, 290, 290);
  if (!entries.length) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#e0e0e0'; ctx.fill();
    ctx.fillStyle = '#999'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Add entries', cx, cy);
    return;
  }
  const slice = (Math.PI * 2) / entries.length;
  entries.forEach((entry, i) => {
    const start = angle + i * slice;
    const end = start + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = highlightIndex === i ? '#FFD700' : COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    const fs = Math.min(13, Math.max(9, 160 / entries.length));
    ctx.font = `${fs}px -apple-system, sans-serif`;
    const label = entry.length > 20 ? entry.substring(0, 19) + '…' : entry;
    ctx.fillText(label, r - 10, fs / 3);
    ctx.restore();
  });
  ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.stroke();
}

function startSpin() {
  if (spinning || entries.length < 2) return;
  spinning = true;
  document.getElementById('spin').disabled = true;
  document.getElementById('result').textContent = '';
  const targetIndex = Math.floor(Math.random() * entries.length);
  const slice = (Math.PI * 2) / entries.length;
  const targetAngle = (Math.PI * 2 * (5 + Math.random())) + (Math.PI * 2 - (targetIndex * slice + slice / 2) - angle % (Math.PI * 2));
  const duration = 3500 + Math.random() * 1500;
  const startTime = performance.now();
  const startAngle = angle;
  function ease(t) { return 1 - Math.pow(1 - t, 4); }
  function frame(now) {
    const t = Math.min((now - startTime) / duration, 1);
    angle = startAngle + targetAngle * ease(t);
    drawWheel();
    if (t < 1) { requestAnimationFrame(frame); return; }
    angle = startAngle + targetAngle;
    const norm = ((-(angle % (Math.PI * 2)) + Math.PI * 4) % (Math.PI * 2));
    const winner = Math.floor(norm / slice) % entries.length;
    drawWheel(winner);
    document.getElementById('result').textContent = entries[winner];
    spinning = false;
    document.getElementById('spin').disabled = false;
  }
  requestAnimationFrame(frame);
}

loadFromURL();
renderList();
drawWheel();
</script>
</body>
</html>
