<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nebula Bonus Wheel Multiplier</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
  .app { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; text-align: center; }
  .pointer { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 24px solid #1a1a1a; margin-bottom: -5px; }
  canvas { border-radius: 50%; border: 1px solid #ddd; background: #fff; }
  #spin { width: 100%; padding: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #1a1a1a; transition: background 0.15s; }
  #spin:hover { background: #f0f0f0; }
  #spin:disabled { opacity: 0.4; cursor: not-allowed; }
  .result { min-height: 40px; text-align: center; font-size: 28px; font-weight: 700; color: #1a1a1a; }
</style>
</head>
<body>
<div class="app">
  <h1>Nebula Bonus Wheel Multiplier</h1>
  <div class="pointer"></div>
  <canvas id="wheel" width="320" height="320"></canvas>
  <button id="spin" onclick="startSpin()">Spin</button>
  <div class="result" id="result"></div>
</div>
<script>
const ENTRIES = ['x2.5', 'x2', 'x1.5', 'x1', 'x0.8', 'x0.5'];
const COLORS = ['#534AB7', '#0F6E56', '#185FA5', '#854F0B', '#993C1D', '#993556'];
const NUM = ENTRIES.length;
const SLICE = (Math.PI * 2) / NUM;
// Pointer is at top = -PI/2. Offset so first segment is centred at top on load.
let rotation = -Math.PI / 2 - SLICE / 2;
let spinning = false;

function drawWheel(highlightIndex) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = 160, cy = 160, r = 156;
  ctx.clearRect(0, 0, 320, 320);
  for (let i = 0; i < NUM; i++) {
    const start = rotation + i * SLICE;
    const end = start + SLICE;
    // Segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = highlightIndex === i ? '#FFD700' : COLORS[i];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Label — always horizontal-readable, drawn from centre outward
    const midAngle = start + SLICE / 2;
    const labelR = r * 0.65;
    const lx = cx + Math.cos(midAngle) * labelR;
    const ly = cy + Math.sin(midAngle) * labelR;
    ctx.save();
    ctx.translate(lx, ly);
    // Rotate text to read outward but flip if it would be upside down
    let textAngle = midAngle;
    if (textAngle > Math.PI / 2 && textAngle < Math.PI * 1.5) textAngle += Math.PI;
    ctx.rotate(textAngle);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px -apple-system, sans-serif';
    ctx.fillText(ENTRIES[i], 0, 0);
    ctx.restore();
  }
  // Centre dot
  ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1; ctx.stroke();
}

function getWinner() {
  // Pointer at top = angle -PI/2 in canvas coords
  const pointerAngle = -Math.PI / 2;
  // Normalise rotation into 0..2PI
  let norm = ((pointerAngle - rotation) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  return Math.floor(norm / SLICE) % NUM;
}

function startSpin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spin').disabled = true;
  document.getElementById('result').textContent = '';
  // Pick a random winner and work out how far to spin to land on it
  const winner = Math.floor(Math.random() * NUM);
  // Target: pointer lands in centre of winner segment
  const targetRotation = -Math.PI / 2 - (winner * SLICE + SLICE / 2);
  // Add several full rotations for drama
  const extraSpins = (5 + Math.floor(Math.random() * 3)) * Math.PI * 2;
  const totalDelta = extraSpins + ((targetRotation - rotation) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const duration = 3500 + Math.random() * 1000;
  const startTime = performance.now();
  const startRotation = rotation;
  function ease(t) { return 1 - Math.pow(1 - t, 4); }
  function frame(now) {
    const t = Math.min((now - startTime) / duration, 1);
    rotation = startRotation + totalDelta * ease(t);
    drawWheel();
    if (t < 1) { requestAnimationFrame(frame); return; }
    rotation = startRotation + totalDelta;
    drawWheel(winner);
    document.getElementById('result').textContent = ENTRIES[winner];
    spinning = false;
    document.getElementById('spin').disabled = false;
  }
  requestAnimationFrame(frame);
}

drawWheel();
</script>
</body>
</html>
